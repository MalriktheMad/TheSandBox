<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Black Candle Lab Zero</title>
  <style>
    :root {
      --void: #030306;
      --text: #f7f4ff;
      --muted: #bdb6d7;
      --line: rgba(247, 244, 255, 0.82);
      --purple: #7c3cff;
      --blue: #1b6fd6;
      --candle: #f8d56b;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--void);
      color: var(--text);
      font-family: "Trebuchet MS", Arial, sans-serif;
      touch-action: none;
    }

    .stage {
      position: fixed;
      inset: 0;
      overflow: hidden;
      cursor: crosshair;
      background: var(--void);
    }

    .world {
      position: absolute;
      left: 0;
      top: 0;
      width: 1600px;
      height: 1200px;
      transform-origin: 0 0;
      background:
        radial-gradient(circle at 22% 18%, rgba(124, 60, 255, 0.24), transparent 28%),
        radial-gradient(circle at 78% 72%, rgba(27, 111, 214, 0.22), transparent 30%),
        radial-gradient(circle at 50% 50%, rgba(248, 213, 107, 0.07), transparent 18%),
        linear-gradient(135deg, #020204 0%, #090612 42%, #06111f 78%, #000 100%);
      will-change: transform;
    }

    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(247, 244, 255, 0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(247, 244, 255, 0.055) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
    }

    .hud {
      position: absolute;
      top: 14px;
      left: 14px;
      right: 14px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
    }

    .title h1 {
      margin: 0;
      color: var(--text);
      font-size: clamp(1.1rem, 5vw, 2rem);
      line-height: 1;
      text-transform: uppercase;
      text-shadow: 0 0 18px rgba(124, 60, 255, 0.7), 3px 3px 0 #000;
    }

    .title p,
    .readout {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.66rem;
      font-weight: 800;
    }

    .readout {
      position: absolute;
      left: 14px;
      bottom: 14px;
      width: 132px;
      border: 2px solid rgba(247, 244, 255, 0.58);
      border-radius: 6px;
      padding: 7px 8px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.06), transparent 40%),
        rgba(5, 5, 8, 0.78);
      box-shadow: 3px 3px 0 rgba(0, 0, 0, 0.72), 0 0 14px rgba(124, 60, 255, 0.18);
      text-align: left;
      text-transform: uppercase;
      pointer-events: auto;
    }

    .sheet-title {
      margin: 0 0 5px;
      border-bottom: 2px solid rgba(247, 244, 255, 0.48);
      padding-bottom: 4px;
      color: var(--text);
      font-size: 0.54rem;
      letter-spacing: 0;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin: 3px 0;
      color: var(--text);
      font-size: 0.56rem;
      line-height: 1.12;
    }

    .stat-row span:first-child {
      color: var(--muted);
    }

    .quick-nav {
      position: absolute;
      right: 14px;
      bottom: 14px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 69px));
      gap: 6px;
      pointer-events: auto;
    }

    .quick-nav a,
    .zoom-controls button {
      border: 2px solid rgba(247, 244, 255, 0.58);
      border-radius: 6px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.07), transparent 42%),
        rgba(5, 5, 8, 0.78);
      box-shadow: 3px 3px 0 rgba(0, 0, 0, 0.72), 0 0 12px rgba(124, 60, 255, 0.16);
      color: var(--text);
      font-weight: 900;
      text-align: center;
      text-decoration: none;
      text-transform: uppercase;
      transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease;
    }

    .quick-nav a {
      padding: 6px 7px;
      font-size: 0.54rem;
    }

    .zoom-controls {
      position: absolute;
      top: 14px;
      right: 14px;
      display: flex;
      gap: 8px;
      pointer-events: auto;
    }

    .zoom-controls button {
      width: 34px;
      height: 34px;
      padding: 0;
      cursor: pointer;
      font: inherit;
      font-size: 1rem;
      line-height: 1;
    }

    .quick-nav a:hover,
    .quick-nav a:focus-visible,
    .zoom-controls button:hover,
    .zoom-controls button:focus-visible {
      background: linear-gradient(135deg, rgba(124, 60, 255, 0.92), rgba(27, 111, 214, 0.9));
      box-shadow: 2px 2px 0 rgba(0, 0, 0, 0.72), 0 0 18px rgba(124, 60, 255, 0.32);
      transform: translate(1px, 1px);
      outline: none;
    }

    .player {
      position: absolute;
      left: 0;
      top: 0;
      width: 40px;
      height: 40px;
      filter: drop-shadow(0 0 10px rgba(248, 213, 107, 0.38)) drop-shadow(5px 5px 0 rgba(0, 0, 0, 0.72));
      transform: translate(-50%, -50%);
      transform-origin: center;
      will-change: left, top, transform;
    }

    .player.facing-left {
      transform: translate(-50%, -50%) scaleX(-1);
    }

    .pixel-bird {
      position: absolute;
      left: 4px;
      top: 4px;
      width: 4px;
      height: 4px;
      background: transparent;
      box-shadow:
        12px 0 #0b0b10, 16px 0 #0b0b10, 20px 0 #0b0b10,
        8px 4px #0b0b10, 12px 4px #ffe85c, 16px 4px #fff27a, 20px 4px #ffe85c, 24px 4px #0b0b10,
        4px 8px #0b0b10, 8px 8px #ffe85c, 12px 8px #fff27a, 16px 8px #ffe85c, 20px 8px #0b0b10, 24px 8px #f8d56b, 28px 8px #0b0b10,
        0 12px #0b0b10, 4px 12px #1b6fd6, 8px 12px #ffe85c, 12px 12px #fff27a, 16px 12px #ffe85c, 20px 12px #0b0b10, 24px 12px #050508, 28px 12px #0b0b10,
        0 16px #0b0b10, 4px 16px #1b6fd6, 8px 16px #42a5ff, 12px 16px #ffe85c, 16px 16px #fff27a, 20px 16px #ffe85c, 24px 16px #0b0b10,
        4px 20px #0b0b10, 8px 20px #1b6fd6, 12px 20px #42a5ff, 16px 20px #ffe85c, 20px 20px #0b0b10,
        8px 24px #0b0b10, 12px 24px #0b0b10, 16px 24px #0b0b10,
        12px 28px #f8d56b, 20px 28px #f8d56b,
        8px 32px #0b0b10, 12px 32px #0b0b10, 20px 32px #0b0b10, 24px 32px #0b0b10;
      image-rendering: pixelated;
    }

    .target {
      position: absolute;
      left: 0;
      top: 0;
      width: 18px;
      height: 18px;
      border: 2px solid var(--candle);
      border-radius: 50%;
      box-shadow: 0 0 18px rgba(248, 213, 107, 0.62);
      opacity: 0;
      transform: translate(-50%, -50%);
      transition: opacity 120ms ease;
      pointer-events: none;
    }

    .target.visible {
      opacity: 1;
    }

    @media (max-width: 620px) {
      .hud {
        display: grid;
      }

      .readout {
        left: 10px;
        bottom: 10px;
        width: 123px;
      }

      .quick-nav {
        right: 10px;
        bottom: 10px;
        grid-template-columns: repeat(2, minmax(0, 56px));
        gap: 5px;
      }

      .quick-nav a {
        padding: 6px 4px;
        font-size: 0.5rem;
      }

      .zoom-controls {
        top: 10px;
        right: 10px;
        gap: 6px;
      }

      .zoom-controls button {
        width: 38px;
        height: 38px;
      }

      .player {
        width: 42px;
        height: 42px;
      }
    }
  </style>
</head>
<body>
  <main id="stage" class="stage" aria-label="Black Candle Lab Zero A Budgie RPG">
    <div id="world" class="world">
      <div class="grid" aria-hidden="true"></div>
      <div id="target" class="target" aria-hidden="true"></div>
      <div id="player" class="player" aria-label="Zero"><div class="pixel-bird" aria-hidden="true"></div></div>
    </div>

    <section class="hud" aria-label="Game status">
      <div class="title">
        <h1>Black Candle Lab Zero</h1>
        <p>A Budgie RPG</p>
      </div>
    </section>

    <div id="zoom-controls" class="zoom-controls" aria-label="Zoom controls">
      <button id="zoom-out" type="button" aria-label="Zoom out">-</button>
      <button id="zoom-in" type="button" aria-label="Zoom in">+</button>
    </div>

    <div id="readout" class="readout">
      <div class="sheet-title">Subject Sheet</div>
      <div class="stat-row"><span>Subject</span><strong>Zero</strong></div>
      <div class="stat-row"><span>Status</span><strong>Compiling</strong></div>
      <div class="stat-row"><span>HP</span><strong>100</strong></div>
      <div class="stat-row"><span>Level</span><strong>1</strong></div>
      <div class="stat-row"><span>Action</span><strong>Tap to Move</strong></div>
    </div>

    <nav id="quick-nav" class="quick-nav" aria-label="Zero menu">
      <a href="characters.html">Character</a>
      <a href="inventory.html">Inventory</a>
      <a href="map.html">Map</a>
      <a href="quests.html">Quest</a>
    </nav>
  </main>

  <script>
    const WORLD_WIDTH = 1600;
    const WORLD_HEIGHT = 1200;
    const MIN_ZOOM = 0.65;
    const MAX_ZOOM = 2;
    const ZOOM_STEP = 0.25;

    const stage = document.getElementById("stage");
    const world = document.getElementById("world");
    const player = document.getElementById("player");
    const targetEl = document.getElementById("target");
    const readout = document.getElementById("readout");
    const quickNav = document.getElementById("quick-nav");
    const zoomControls = document.getElementById("zoom-controls");
    const zoomIn = document.getElementById("zoom-in");
    const zoomOut = document.getElementById("zoom-out");

    const state = {
      x: WORLD_WIDTH / 2,
      y: WORLD_HEIGHT / 2,
      targetX: WORLD_WIDTH / 2,
      targetY: WORLD_HEIGHT / 2,
      speed: 260,
      zoom: 1,
      cameraX: 0,
      cameraY: 0,
      lastTime: performance.now()
    };

    placePlayer();
    placeTarget();
    placeCamera();
    requestAnimationFrame(tick);

    stage.addEventListener("pointerdown", setTarget);
    stage.addEventListener("pointermove", (event) => {
      if (event.buttons === 1 && event.pointerType !== "mouse") {
        setTarget(event);
      }
    });

    [readout, quickNav, zoomControls].forEach((element) => {
      element.addEventListener("pointerdown", stopUiMovement);
    });

    zoomIn.addEventListener("click", () => changeZoom(ZOOM_STEP));
    zoomOut.addEventListener("click", () => changeZoom(-ZOOM_STEP));

    window.addEventListener("resize", () => {
      state.x = clampWorldX(state.x);
      state.y = clampWorldY(state.y);
      state.targetX = clampWorldX(state.targetX);
      state.targetY = clampWorldY(state.targetY);
      placePlayer();
      placeTarget();
      placeCamera();
    });

    function stopUiMovement(event) {
      event.stopPropagation();
    }

    function setTarget(event) {
      if (event.target.closest(".readout, .quick-nav, .zoom-controls")) {
        return;
      }

      const point = screenToWorld(event.clientX, event.clientY);
      state.targetX = clampWorldX(point.x);
      state.targetY = clampWorldY(point.y);
      targetEl.classList.add("visible");
      placeTarget();
    }

    function changeZoom(amount) {
      state.zoom = clamp(roundZoom(state.zoom + amount), MIN_ZOOM, MAX_ZOOM);
      placeCamera();
    }

    function tick(now) {
      const delta = Math.min((now - state.lastTime) / 1000, 0.05);
      state.lastTime = now;

      const dx = state.targetX - state.x;
      const dy = state.targetY - state.y;
      const distance = Math.hypot(dx, dy);
      const step = state.speed * delta;

      if (distance > 1) {
        const move = Math.min(step, distance);
        const nextX = state.x + (dx / distance) * move;
        const nextY = state.y + (dy / distance) * move;

        if (isUiBlocked(nextX, nextY)) {
          state.targetX = state.x;
          state.targetY = state.y;
          targetEl.classList.remove("visible");
        } else {
          player.classList.toggle("facing-left", dx < -1);
          state.x = nextX;
          state.y = nextY;
          placePlayer();
          placeCamera();
        }
      } else {
        targetEl.classList.remove("visible");
      }

      requestAnimationFrame(tick);
    }

    function placePlayer() {
      player.style.left = `${state.x}px`;
      player.style.top = `${state.y}px`;
    }

    function placeTarget() {
      targetEl.style.left = `${state.targetX}px`;
      targetEl.style.top = `${state.targetY}px`;
    }

    function placeCamera() {
      const scaledWidth = WORLD_WIDTH * state.zoom;
      const scaledHeight = WORLD_HEIGHT * state.zoom;
      const viewWidth = window.innerWidth;
      const viewHeight = window.innerHeight;

      state.cameraX = scaledWidth <= viewWidth
        ? (viewWidth - scaledWidth) / 2
        : clamp(viewWidth / 2 - state.x * state.zoom, viewWidth - scaledWidth, 0);
      state.cameraY = scaledHeight <= viewHeight
        ? (viewHeight - scaledHeight) / 2
        : clamp(viewHeight / 2 - state.y * state.zoom, viewHeight - scaledHeight, 0);

      world.style.transform = `translate(${state.cameraX}px, ${state.cameraY}px) scale(${state.zoom})`;
    }

    function screenToWorld(screenX, screenY) {
      return {
        x: (screenX - state.cameraX) / state.zoom,
        y: (screenY - state.cameraY) / state.zoom
      };
    }

    function worldToScreen(worldX, worldY) {
      return {
        x: state.cameraX + worldX * state.zoom,
        y: state.cameraY + worldY * state.zoom
      };
    }

    function isUiBlocked(worldX, worldY) {
      const screenPoint = worldToScreen(worldX, worldY);
      return getBlockedRects().some((rect) => {
        return screenPoint.x >= rect.left && screenPoint.x <= rect.right && screenPoint.y >= rect.top && screenPoint.y <= rect.bottom;
      });
    }

    function getBlockedRects() {
      return [readout, quickNav, zoomControls].map((element) => {
        const rect = element.getBoundingClientRect();
        const padding = getPlayerRadius() * state.zoom + 8;
        return {
          left: rect.left - padding,
          right: rect.right + padding,
          top: rect.top - padding,
          bottom: rect.bottom + padding
        };
      });
    }

    function getPlayerRadius() {
      return player.getBoundingClientRect().width / 2;
    }

    function clampWorldX(value) {
      return clamp(value, 24, WORLD_WIDTH - 24);
    }

    function clampWorldY(value) {
      return clamp(value, 24, WORLD_HEIGHT - 24);
    }

    function roundZoom(value) {
      return Math.round(value * 100) / 100;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }
  </script>
</body>
</html>
