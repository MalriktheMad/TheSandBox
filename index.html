<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comic Book RPG</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>⚔️ COMIC QUEST ⚔️</h1>
        
        <div class="comic-panel">
            <div id="story-text"></div>
        </div>

        <div class="choices">
            <button id="LabZero" class="choice-btn">LabZero</button>
            <button id="Dylan is to baked to play this game right now." class="choice-btn">Dylan is to baked to play this game right now.</button>
        </div>

        <div class="stats">
            <p>HP: <span id="hp">100</span></p>
            <p>Level: <span id="level">1</span></p>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
