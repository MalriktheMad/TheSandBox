<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Black Candle Lab Zero</title>
  <style>
    :root {
      --void: #030306;
      --text: #f7f4ff;
      --muted: #bdb6d7;
      --line: rgba(247, 244, 255, 0.82);
      --purple: #7c3cff;
      --blue: #1b6fd6;
      --candle: #f8d56b;
      --player: #f7f4ff;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--void);
      color: var(--text);
      font-family: "Trebuchet MS", Arial, sans-serif;
      touch-action: none;
    }

    .stage {
      position: fixed;
      inset: 0;
      overflow: hidden;
      cursor: crosshair;
      background:
        radial-gradient(circle at 22% 18%, rgba(124, 60, 255, 0.24), transparent 28%),
        radial-gradient(circle at 78% 72%, rgba(27, 111, 214, 0.22), transparent 30%),
        radial-gradient(circle at 50% 50%, rgba(248, 213, 107, 0.07), transparent 18%),
        linear-gradient(135deg, #020204 0%, #090612 42%, #06111f 78%, #000 100%);
    }

    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(247, 244, 255, 0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(247, 244, 255, 0.055) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: radial-gradient(circle at center, #000 20%, transparent 84%);
      pointer-events: none;
    }

    .hud {
      position: absolute;
      top: 14px;
      left: 14px;
      right: 14px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
    }

    .title h1 {
      margin: 0;
      color: var(--text);
      font-size: clamp(1.1rem, 5vw, 2rem);
      line-height: 1;
      text-transform: uppercase;
      text-shadow: 0 0 18px rgba(124, 60, 255, 0.7), 3px 3px 0 #000;
    }

    .title p,
    .readout {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 800;
    }

    .readout {
      min-width: 132px;
      border: 2px solid rgba(247, 244, 255, 0.46);
      border-radius: 6px;
      padding: 8px 10px;
      background: rgba(5, 5, 8, 0.72);
      box-shadow: 0 0 18px rgba(124, 60, 255, 0.2);
      text-align: right;
    }

    .player {
      position: absolute;
      left: 0;
      top: 0;
      width: 34px;
      height: 34px;
      border: 3px solid #000;
      border-radius: 4px;
      background: var(--player);
      box-shadow:
        0 0 0 2px var(--line),
        0 0 22px rgba(247, 244, 255, 0.42),
        6px 6px 0 rgba(0, 0, 0, 0.72);
      transform: translate(-50%, -50%);
      will-change: left, top;
    }

    .player::after {
      content: "Zero";
      position: absolute;
      left: 50%;
      top: 50%;
      color: #050508;
      font-size: 0.52rem;
      font-weight: 900;
      transform: translate(-50%, -50%);
    }

    .target {
      position: absolute;
      left: 0;
      top: 0;
      width: 18px;
      height: 18px;
      border: 2px solid var(--candle);
      border-radius: 50%;
      box-shadow: 0 0 18px rgba(248, 213, 107, 0.62);
      opacity: 0;
      transform: translate(-50%, -50%);
      transition: opacity 120ms ease;
      pointer-events: none;
    }

    .target.visible {
      opacity: 1;
    }

    .label {
      position: absolute;
      left: 50%;
      bottom: 18px;
      max-width: min(520px, calc(100% - 28px));
      border: 2px solid rgba(247, 244, 255, 0.48);
      border-radius: 6px;
      padding: 10px 12px;
      background: rgba(5, 5, 8, 0.74);
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 800;
      text-align: center;
      transform: translateX(-50%);
      pointer-events: none;
    }

    @media (max-width: 620px) {
      .hud {
        display: grid;
      }

      .readout {
        min-width: 0;
        width: fit-content;
        text-align: left;
      }

      .player {
        width: 38px;
        height: 38px;
      }
    }
  </style>
</head>
<body>
  <main id="stage" class="stage" aria-label="Black Candle Lab Zero movement test">
    <div class="grid" aria-hidden="true"></div>
    <section class="hud" aria-label="Game status">
      <div class="title">
        <h1>Black Candle Lab Zero</h1>
        <p>Tap or click anywhere to move the box.</p>
      </div>
      <div id="readout" class="readout">X: 0<br>Y: 0</div>
    </section>
    <div id="target" class="target" aria-hidden="true"></div>
    <div id="player" class="player" aria-label="Zero"></div>
    <div class="label">Foundation test: one box, one screen, one tap-to-move system.</div>
  </main>

  <script>
    const stage = document.getElementById("stage");
    const player = document.getElementById("player");
    const targetEl = document.getElementById("target");
    const readout = document.getElementById("readout");

    const state = {
      x: window.innerWidth / 2,
      y: window.innerHeight / 2,
      targetX: window.innerWidth / 2,
      targetY: window.innerHeight / 2,
      speed: 260,
      lastTime: performance.now()
    };

    placePlayer();
    requestAnimationFrame(tick);

    stage.addEventListener("pointerdown", setTarget);
    stage.addEventListener("pointermove", (event) => {
      if (event.buttons === 1 && event.pointerType !== "mouse") {
        setTarget(event);
      }
    });

    window.addEventListener("resize", () => {
      state.x = clamp(state.x, 20, window.innerWidth - 20);
      state.y = clamp(state.y, 20, window.innerHeight - 20);
      state.targetX = clamp(state.targetX, 20, window.innerWidth - 20);
      state.targetY = clamp(state.targetY, 20, window.innerHeight - 20);
      placePlayer();
      placeTarget();
    });

    function setTarget(event) {
      state.targetX = clamp(event.clientX, 20, window.innerWidth - 20);
      state.targetY = clamp(event.clientY, 20, window.innerHeight - 20);
      targetEl.classList.add("visible");
      placeTarget();
    }

    function tick(now) {
      const delta = Math.min((now - state.lastTime) / 1000, 0.05);
      state.lastTime = now;

      const dx = state.targetX - state.x;
      const dy = state.targetY - state.y;
      const distance = Math.hypot(dx, dy);
      const step = state.speed * delta;

      if (distance > 1) {
        const move = Math.min(step, distance);
        state.x += (dx / distance) * move;
        state.y += (dy / distance) * move;
        placePlayer();
      } else {
        targetEl.classList.remove("visible");
      }

      requestAnimationFrame(tick);
    }

    function placePlayer() {
      player.style.left = `${state.x}px`;
      player.style.top = `${state.y}px`;
      readout.innerHTML = `X: ${Math.round(state.x)}<br>Y: ${Math.round(state.y)}`;
    }

    function placeTarget() {
      targetEl.style.left = `${state.targetX}px`;
      targetEl.style.top = `${state.targetY}px`;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }
  </script>
</body>
</html>
