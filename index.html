<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Black Candle Lab Zero</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="interiors.css">
</head>
<body>
  <main id="stage" class="stage" aria-label="Black Candle Lab Zero A Budgie RPG">
    <div id="world" class="world">
      <div class="forest-floor" aria-hidden="true"></div>
      <div class="beach" aria-hidden="true"></div>
      <div class="water" aria-hidden="true"></div>
      <div class="shore-cliff" aria-hidden="true"></div>
      <div class="tree" style="left: 120px; top: 160px;"></div>
      <div class="tree" style="left: 244px; top: 320px;"></div>
      <div class="tree" style="left: 420px; top: 210px;"></div>
      <div class="tree" style="left: 590px; top: 430px;"></div>
      <div class="tree" style="left: 780px; top: 155px;"></div>
      <div class="tree" style="left: 940px; top: 360px;"></div>
      <div class="tree" style="left: 1120px; top: 235px;"></div>
      <div class="tree" style="left: 1280px; top: 450px;"></div>
      <div class="tree" style="left: 1450px; top: 310px;"></div>
      <div class="tree" style="left: 220px; top: 590px;"></div>
      <div class="tree" style="left: 520px; top: 700px;"></div>
      <div class="tree" style="left: 860px; top: 630px;"></div>
      <div class="tree" style="left: 1180px; top: 720px;"></div>
      <div class="tree" style="left: 1380px; top: 650px;"></div>
      <div class="old-dilly" aria-label="Old Dilly's House">
        <div class="dilly-garden" aria-hidden="true">
          <div class="garden-row"></div>
          <div class="garden-plant fern" style="left: 34px; top: 54px;"></div>
          <div class="garden-plant flower" style="left: 72px; top: 24px;"></div>
          <div class="garden-plant mushroom" style="left: 118px; top: 58px;"></div>
          <div class="garden-plant herb" style="left: 162px; top: 26px;"></div>
          <div class="garden-plant crystal" style="left: 206px; top: 48px;"></div>
          <div class="garden-plant flower" style="left: 242px; top: 72px;"></div>
          <div class="garden-plant fern" style="left: 278px; top: 40px;"></div>
        </div>
        <div class="dilly-shadow"></div>
        <div class="dilly-trunk"></div>
        <div class="dilly-canopy"></div>
        <div class="dilly-platform"></div>
        <div class="dilly-house">
          <div class="dilly-door"></div>
          <div class="dilly-window"></div>
        </div>
        <div class="dilly-sign">Old Dilly and Liz's</div>
      </div>
      <div class="lab-ground" aria-hidden="true"></div>
      <div class="lab" aria-label="Lab Zero">
        <div class="lab-pipe"></div>
        <div class="lab-sign">Lab Zero</div>
        <div class="lab-window one"></div>
        <div class="lab-window two"></div>
        <div class="lab-door"></div>
      </div>
      <div id="target" class="target" aria-hidden="true"></div>
      <div id="player" class="player" aria-label="Zero"><div class="pixel-bird" aria-hidden="true"></div></div>
    </div>

    <div id="lab-interior" class="lab-interior" aria-label="Inside Lab Zero" hidden>
      <div class="lab-floor" aria-hidden="true"></div>
      <div class="lab-rug" aria-hidden="true"></div>
      <div class="lab-bench one" aria-label="Experiment bench">
        <div class="lab-note one" aria-hidden="true"></div>
        <div class="lab-vial purple" aria-hidden="true"></div>
        <div class="lab-vial blue" aria-hidden="true"></div>
      </div>
      <div class="lab-bench two" aria-label="Arcane workbench">
        <div class="lab-note two" aria-hidden="true"></div>
        <div class="lab-candle small" aria-hidden="true"></div>
        <div class="lab-jar" aria-hidden="true"></div>
      </div>
      <div class="lab-core" aria-label="Strange experiment"></div>
      <div class="lab-console" aria-label="Weird console"></div>
      <div class="codex-terminal" aria-label="Codex workstation"></div>
      <div class="lab-candle tall" aria-hidden="true"></div>
      <div class="bird-cage left" aria-label="Bird cage"></div>
      <div class="bird-cage right" aria-label="Bird cage"></div>
      <div class="wizard-chair" aria-label="Empty wizard chair"></div>
      <div class="wing-master-cricket" aria-label="Wing Master Cricket"></div>
      <div class="lab-wall-note" aria-hidden="true"></div>
      <div class="lab-exit" aria-label="Exit Lab Zero"></div>
      <div id="interior-target" class="target" aria-hidden="true"></div>
      <div id="interior-player" class="player" aria-label="Little Wing"><div class="pixel-bird" aria-hidden="true"></div></div>
    </div>

    <div id="dilly-interior" class="dilly-interior" aria-label="Inside Old Dilly and Liz's treehouse" hidden>
      <div class="dilly-floor" aria-hidden="true"></div>
      <div class="dilly-canopy-light" aria-hidden="true"></div>
      <div class="dilly-kitchen" aria-label="Old Dilly cooking"></div>
      <div class="old-dilly-npc" aria-label="Old Dilly"></div>
      <div class="liz-art-corner" aria-label="Liz drawing art"></div>
      <div class="liz-npc" aria-label="Liz"></div>
      <div class="greenhouse-sofa" aria-hidden="true"></div>
      <div class="plant-wall left" aria-hidden="true"></div>
      <div class="plant-wall right" aria-hidden="true"></div>
      <div class="plant-cluster one" aria-hidden="true"></div>
      <div class="plant-cluster two" aria-hidden="true"></div>
      <div class="plant-cluster three" aria-hidden="true"></div>
      <div class="hanging-planter one" aria-hidden="true"></div>
      <div class="hanging-planter two" aria-hidden="true"></div>
      <div class="dilly-exit" aria-label="Exit Old Dilly and Liz's"></div>
      <div id="dilly-target" class="target" aria-hidden="true"></div>
      <div id="dilly-player" class="player" aria-label="Little Wing"><div class="pixel-bird" aria-hidden="true"></div></div>
    </div>

    <section class="hud" aria-label="Game status">
      <div class="title">
        <h1>Black Candle Lab Zero</h1>
        <p>A Budgie RPG</p>
      </div>
    </section>

    <div id="zoom-controls" class="zoom-controls" aria-label="Zoom controls">
      <button id="zoom-out" type="button" aria-label="Zoom out">-</button>
      <button id="zoom-in" type="button" aria-label="Zoom in">+</button>
    </div>

    <div id="readout" class="readout">
      <div class="sheet-title">Subject Sheet</div>
      <div class="stat-row"><span>Subject</span><strong>Little Wing</strong></div>
      <div class="stat-row"><span>Status</span><strong>Bird Assassin</strong></div>
      <div class="stat-row"><span>HP</span><strong>100</strong></div>
      <div class="stat-row"><span>Level</span><strong>1</strong></div>
      <div class="stat-row"><span>Action</span><strong>Tap to Move</strong></div>
    </div>

    <nav id="quick-nav" class="quick-nav" aria-label="Zero menu">
      <a href="characters.html">Character</a>
      <a href="inventory.html">Inventory</a>
      <a href="map.html">Map</a>
      <a href="quests.html">Quest</a>
    </nav>
  </main>

  <script src="game.js"></script>
</body>
</html>
