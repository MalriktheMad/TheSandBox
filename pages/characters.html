<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Little Wing</title>
  <style>
    :root {
      --void: #030306;
      --text: #f7f4ff;
      --muted: #bdb6d7;
      --purple: #7c3cff;
      --blue: #1b6fd6;
      --candle: #f8d56b;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background:
        radial-gradient(circle at 24% 18%, rgba(124, 60, 255, 0.2), transparent 30%),
        radial-gradient(circle at 78% 72%, rgba(27, 111, 214, 0.14), transparent 32%),
        var(--void);
      color: var(--text);
      font-family: "Trebuchet MS", Arial, sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .character-page {
      width: min(520px, 100%);
      border: 3px solid rgba(247, 244, 255, 0.72);
      border-radius: 6px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.07), transparent 42%),
        rgba(5, 5, 8, 0.88);
      box-shadow: 4px 5px 0 rgba(0, 0, 0, 0.72), 0 0 28px rgba(124, 60, 255, 0.24);
      overflow: hidden;
    }

    .portrait-frame {
      display: grid;
      place-items: center;
      min-height: 320px;
      border-bottom: 3px solid rgba(247, 244, 255, 0.48);
      background:
        linear-gradient(180deg, rgba(124, 60, 255, 0.22), rgba(5, 5, 8, 0.34)),
        #050508;
    }

    .portrait-frame img {
      width: min(340px, 86vw);
      aspect-ratio: 1;
      object-fit: cover;
      object-position: center top;
      image-rendering: auto;
    }

    .sheet {
      padding: 18px;
    }

    h1 {
      margin: 0 0 4px;
      color: var(--text);
      font-size: 1.45rem;
      line-height: 1;
      text-transform: uppercase;
      text-shadow: 0 0 16px rgba(124, 60, 255, 0.72), 3px 3px 0 #000;
    }

    .subtitle {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 900;
      text-transform: uppercase;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-top: 2px solid rgba(247, 244, 255, 0.16);
      padding: 10px 0;
      color: var(--text);
      font-size: 0.82rem;
      font-weight: 900;
      text-transform: uppercase;
    }

    .stat-row span {
      color: var(--muted);
    }

    .back-link {
      display: block;
      margin-top: 14px;
      border: 2px solid rgba(247, 244, 255, 0.62);
      border-radius: 6px;
      padding: 12px 14px;
      background: linear-gradient(135deg, rgba(124, 60, 255, 0.9), rgba(27, 111, 214, 0.88));
      box-shadow: 3px 3px 0 rgba(0, 0, 0, 0.72);
      color: var(--text);
      font-size: 0.82rem;
      font-weight: 900;
      text-align: center;
      text-decoration: none;
      text-transform: uppercase;
    }

    .back-link:focus-visible,
    .back-link:hover {
      outline: none;
      transform: translate(1px, 1px);
      box-shadow: 2px 2px 0 rgba(0, 0, 0, 0.72), 0 0 20px rgba(124, 60, 255, 0.38);
    }

    @media (max-width: 560px) {
      body {
        padding: 10px;
      }

      .portrait-frame {
        min-height: 260px;
      }

      .sheet {
        padding: 14px;
      }

      h1 {
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>
  <main class="character-page" aria-label="Little Wing character sheet">
    <section class="portrait-frame" aria-label="Little Wing portrait">
      <img src="../assets/portraits/little-wing.svg" alt="Little Wing portrait">
    </section>

    <section class="sheet" aria-label="Character details">
      <h1>Little Wing</h1>
      <p class="subtitle">Subject Sheet</p>
      <div class="stat-row"><span>Subject</span><strong>Little Wing</strong></div>
      <div class="stat-row"><span>Status</span><strong>Bird Assassin</strong></div>
      <div class="stat-row"><span>HP</span><strong>100</strong></div>
      <div class="stat-row"><span>Level</span><strong>1</strong></div>
      <a class="back-link" href="../index.html" onclick="return goBack(event)">Back</a>
    </section>
  </main>

  <script>
    function goBack(event) {
      event.preventDefault();

      if (window.history.length > 1) {
        window.history.back();
      } else {
        window.location.href = "../index.html";
      }

      return false;
    }
<<</script>
</body>

</html>
