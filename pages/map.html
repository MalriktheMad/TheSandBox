<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Map</title>
  <style>
    :root {
      --void: #030306;
      --text: #f7f4ff;
      --muted: #bdb6d7;
      --purple: #7c3cff;
      --blue: #1b6fd6;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background:
        radial-gradient(circle at 24% 18%, rgba(124, 60, 255, 0.2), transparent 30%),
        radial-gradient(circle at 78% 72%, rgba(27, 111, 214, 0.14), transparent 32%),
        var(--void);
      color: var(--text);
      font-family: "Trebuchet MS", Arial, sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .map-message {
      width: min(420px, 100%);
      border: 3px solid rgba(247, 244, 255, 0.72);
      border-radius: 6px;
      padding: 24px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.07), transparent 42%),
        rgba(5, 5, 8, 0.88);
      box-shadow: 4px 5px 0 rgba(0, 0, 0, 0.72), 0 0 28px rgba(124, 60, 255, 0.24);
      text-align: center;
    }

    h1 {
      margin: 0 0 18px;
      color: var(--text);
      font-size: 1.25rem;
      line-height: 1.15;
      text-transform: uppercase;
      text-shadow: 0 0 16px rgba(124, 60, 255, 0.72), 3px 3px 0 #000;
    }

    .back-link {
      display: block;
      border: 2px solid rgba(247, 244, 255, 0.62);
      border-radius: 6px;
      padding: 12px 14px;
      background: linear-gradient(135deg, rgba(124, 60, 255, 0.9), rgba(27, 111, 214, 0.88));
      box-shadow: 3px 3px 0 rgba(0, 0, 0, 0.72);
      color: var(--text);
      font-size: 0.82rem;
      font-weight: 900;
      text-align: center;
      text-decoration: none;
      text-transform: uppercase;
    }

    .back-link:focus-visible,
    .back-link:hover {
      outline: none;
      transform: translate(1px, 1px);
      box-shadow: 2px 2px 0 rgba(0, 0, 0, 0.72), 0 0 20px rgba(124, 60, 255, 0.38);
    }
  </style>
</head>
<body>
  <main class="map-message" aria-label="Map">
    <h1>Little Wing is not really sure where he is.</h1>
    <a class="back-link" href="../index.html">Back</a>
  </main>

  
</body>
</html>

</body>
</html>
