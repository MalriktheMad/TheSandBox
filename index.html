<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Black Candle Lab Zero</title>
  <style>
    :root {
      --void: #030306;
      --text: #f7f4ff;
      --muted: #bdb6d7;
      --line: rgba(247, 244, 255, 0.82);
      --purple: #7c3cff;
      --blue: #1b6fd6;
      --candle: #f8d56b;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--void);
      color: var(--text);
      font-family: "Trebuchet MS", Arial, sans-serif;
      touch-action: none;
    }

    .stage {
      position: fixed;
      inset: 0;
      overflow: hidden;
      cursor: crosshair;
      background: var(--void);
    }

    .world {
      position: absolute;
      left: 0;
      top: 0;
      width: 1600px;
      height: 1200px;
      transform-origin: 0 0;
      background:
        radial-gradient(circle at 22% 18%, rgba(124, 60, 255, 0.18), transparent 26%),
        radial-gradient(circle at 78% 22%, rgba(27, 111, 214, 0.12), transparent 30%),
        linear-gradient(135deg, #071b12 0%, #0b2618 48%, #092015 100%);
      will-change: transform;
    }

    .forest-floor,
    .beach,
    .water,
    .shore-cliff,
    .cliff-sand-wrap,
    .lab,
    .tree,
    .lab-ground {
      position: absolute;
      pointer-events: none;
    }

    .forest-floor {
      inset: 0 0 190px 0;
      background-image:
        radial-gradient(circle, rgba(150, 210, 118, 0.18) 2px, transparent 3px),
        radial-gradient(circle, rgba(10, 50, 27, 0.8) 2px, transparent 3px),
        linear-gradient(rgba(247, 244, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(247, 244, 255, 0.035) 1px, transparent 1px);
      background-position: 0 0, 16px 18px, 0 0, 0 0;
      background-size: 72px 72px, 96px 96px, 32px 32px, 32px 32px;
    }

    .beach {
      left: 0;
      right: 0;
      bottom: 70px;
      height: 165px;
      background:
        radial-gradient(circle at 12px 18px, rgba(225, 216, 174, 0.32) 2px, transparent 3px),
        radial-gradient(circle at 44px 54px, rgba(55, 48, 44, 0.34) 2px, transparent 4px),
        radial-gradient(circle at 70px 24px, rgba(115, 105, 88, 0.35) 2px, transparent 3px),
        linear-gradient(180deg, #5d5a48 0%, #918968 20%, #b4a26f 52%, #746c5a 100%);
      background-size: 82px 82px, 94px 94px, 106px 106px, auto;
      clip-path: polygon(0 20px, 4% 10px, 9% 26px, 15% 14px, 21% 30px, 28% 18px, 36% 25px, 44% 12px, 52% 28px, 61% 16px, 70% 30px, 79% 18px, 88% 27px, 100% 14px, 100% 100%, 0 100%);
    }

    .beach::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 34px;
      background:
        linear-gradient(90deg, transparent 0 18px, rgba(13, 48, 27, 0.92) 18px 32px, transparent 32px 48px),
        linear-gradient(180deg, rgba(20, 69, 39, 0.78), transparent);
      background-size: 64px 100%, auto;
    }

    .beach::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 36px;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.18) 0 22px, transparent 22px 60px),
        linear-gradient(180deg, transparent, rgba(24, 63, 77, 0.36));
      background-size: 104px 100%, auto;
    }

    .shore-cliff {
      left: 0;
      bottom: 235px;
      width: 270px;
      height: 380px;
      background:
        radial-gradient(circle at 74px 42px, rgba(39, 105, 54, 0.82) 0 3px, transparent 4px),
        radial-gradient(circle at 132px 96px, rgba(77, 142, 69, 0.78) 0 4px, transparent 5px),
        radial-gradient(circle at 204px 70px, rgba(34, 89, 43, 0.84) 0 3px, transparent 4px),
        radial-gradient(circle at 92px 146px, rgba(55, 126, 57, 0.78) 0 4px, transparent 5px),
        radial-gradient(circle at 58px 54px, rgba(18, 17, 17, 0.42) 0 18px, transparent 19px),
        radial-gradient(circle at 164px 118px, rgba(45, 38, 32, 0.78) 0 24px, transparent 25px),
        linear-gradient(135deg, #22231f 0%, #5a5142 38%, #302c27 68%, #141410 100%);
      box-shadow: inset -18px -24px 0 rgba(0, 0, 0, 0.32), 18px 0 18px rgba(0, 0, 0, 0.18);
      clip-path: polygon(0 0, 74% 0, 62% 12%, 78% 22%, 58% 34%, 68% 45%, 47% 57%, 55% 70%, 36% 84%, 44% 100%, 0 100%);
      z-index: 2;
    }

    .cliff-sand-wrap {
      left: 0;
      bottom: 212px;
      width: 255px;
      height: 78px;
      background:
        radial-gradient(circle at 38px 42px, rgba(77, 68, 54, 0.44) 0 4px, transparent 5px),
        radial-gradient(circle at 112px 28px, rgba(213, 190, 128, 0.42) 0 5px, transparent 6px),
        radial-gradient(circle at 178px 54px, rgba(55, 48, 44, 0.42) 0 4px, transparent 5px),
        linear-gradient(135deg, rgba(180, 162, 111, 0.96) 0%, rgba(137, 126, 93, 0.92) 46%, rgba(72, 65, 52, 0.72) 100%);
      box-shadow: inset -18px 12px 0 rgba(43, 38, 32, 0.24), 0 -8px 0 rgba(28, 65, 38, 0.18);
      clip-path: polygon(0 34%, 16% 18%, 32% 28%, 46% 10%, 62% 25%, 80% 15%, 100% 34%, 88% 54%, 69% 49%, 55% 69%, 35% 56%, 18% 78%, 0 68%);
      z-index: 3;
    }

    .water {
      left: 0;
      right: 0;
      bottom: 0;
      height: 82px;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.18) 0 18px, transparent 18px 58px),
        linear-gradient(180deg, #145e88 0%, #083e66 100%);
      background-size: 96px 100%, auto;
      border-top: 6px solid rgba(180, 200, 196, 0.42);
    }

    .tree {
      width: 28px;
      height: 36px;
      background: transparent;
      box-shadow:
        8px 0 #06100b, 12px 0 #06100b, 16px 0 #06100b,
        4px 4px #06100b, 8px 4px #164823, 12px 4px #1f6330, 16px 4px #164823, 20px 4px #06100b,
        0 8px #06100b, 4px 8px #1f6330, 8px 8px #2a7a3c, 12px 8px #318b46, 16px 8px #2a7a3c, 20px 8px #1f6330, 24px 8px #06100b,
        4px 12px #06100b, 8px 12px #1f6330, 12px 12px #2a7a3c, 16px 12px #1f6330, 20px 12px #06100b,
        8px 16px #06100b, 12px 16px #5b3823, 16px 16px #06100b,
        8px 20px #06100b, 12px 20px #5b3823, 16px 20px #06100b,
        8px 24px #06100b, 12px 24px #5b3823, 16px 24px #06100b,
        8px 28px #06100b, 12px 28px #5b3823, 16px 28px #06100b;
      image-rendering: pixelated;
    }

    .lab-ground {
      right: 126px;
      top: 188px;
      width: 220px;
      height: 72px;
      border-radius: 44% 48% 38% 42%;
      background:
        radial-gradient(circle at 24px 52px, rgba(54, 31, 15, 0.9) 0 8px, transparent 9px),
        radial-gradient(circle at 160px 46px, rgba(76, 45, 22, 0.82) 0 10px, transparent 11px),
        radial-gradient(circle at 112px 38px, rgba(12, 8, 6, 0.5) 0 36px, transparent 37px),
        #3a2413;
      box-shadow: -28px -18px 20px rgba(0, 0, 0, 0.34), inset 0 0 0 8px rgba(8, 28, 15, 0.22);
      z-index: 0;
    }

    .lab-ground::before {
      content: "";
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: 4px;
      height: 14px;
      background:
        linear-gradient(90deg, transparent 0 8px, #164823 8px 14px, transparent 14px 24px),
        linear-gradient(90deg, transparent 0 18px, #1f6330 18px 24px, transparent 24px 40px);
      background-size: 40px 100%, 52px 100%;
    }

    .lab {
      right: 150px;
      top: 112px;
      width: 160px;
      height: 112px;
      border: 4px solid #050508;
      background:
        linear-gradient(90deg, rgba(5, 5, 8, 0.18) 0 6px, transparent 6px 20px),
        linear-gradient(180deg, rgba(255, 255, 255, 0.05), transparent 24%),
        repeating-linear-gradient(90deg, #28180f 0 18px, #1b100a 18px 22px, #352114 22px 40px);
      box-shadow: 0 0 26px rgba(124, 60, 255, 0.28);
      z-index: 1;
    }

    .lab::before {
      content: "";
      position: absolute;
      left: -12px;
      right: -12px;
      top: -34px;
      height: 36px;
      border: 4px solid #050508;
      background:
        linear-gradient(135deg, transparent 0 18px, #050508 18px 24px, #1b100a 24px 100%),
        repeating-linear-gradient(90deg, #17100b 0 22px, #2b1a10 22px 42px);
      box-shadow: 0 8px 0 rgba(0, 0, 0, 0.52);
    }

    .lab::after {
      content: "";
      position: absolute;
      left: -46px;
      right: 18px;
      bottom: 4px;
      height: 34px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.42);
      box-shadow: -18px -16px 18px rgba(0, 0, 0, 0.3);
      transform: skewX(-18deg);
      z-index: -1;
    }

    .lab-sign {
      position: absolute;
      left: 50%;
      top: 12px;
      width: 104px;
      border: 3px solid #050508;
      border-radius: 3px;
      padding: 5px 6px;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.08), transparent 40%),
        #2b1a10;
      color: #d8d1f0;
      font-size: 0.62rem;
      font-weight: 900;
      text-align: center;
      text-transform: uppercase;
      transform: translateX(-50%);
      text-shadow: 0 0 9px rgba(124, 60, 255, 0.82);
      box-shadow: inset 0 -4px 0 rgba(0, 0, 0, 0.26), 0 3px 0 rgba(0, 0, 0, 0.4);
      z-index: 2;
    }

    .lab-sign::before,
    .lab-sign::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 5px;
      height: 5px;
      background: #050508;
      transform: translateY(-50%);
    }

    .lab-sign::before {
      left: 7px;
    }

    .lab-sign::after {
      right: 7px;
    }

    .lab-door {
      position: absolute;
      left: 62px;
      bottom: 0;
      width: 34px;
      height: 42px;
      border: 3px solid #050508;
      border-bottom: 0;
      background:
        linear-gradient(90deg, transparent 0 14px, rgba(124, 60, 255, 0.38) 14px 19px, transparent 19px),
        linear-gradient(180deg, #20130c, #0d0806);
      box-shadow: inset 0 0 14px rgba(124, 60, 255, 0.36), 0 0 12px rgba(124, 60, 255, 0.24);
      z-index: 1;
    }

    .lab-window {
      position: absolute;
      width: 26px;
      height: 22px;
      border: 3px solid #050508;
      background: #7c3cff;
      box-shadow: 0 0 18px rgba(124, 60, 255, 0.82), inset 0 0 8px rgba(247, 244, 255, 0.42);
    }

    .lab-window::before {
      content: "";
      position: absolute;
      left: 8px;
      top: -3px;
      width: 3px;
      height: 22px;
      background: #050508;
    }

    .lab-window::after {
      content: "";
      position: absolute;
      left: -3px;
      top: 8px;
      width: 26px;
      height: 3px;
      background: #050508;
    }

    .lab-window.one {
      left: 20px;
      top: 60px;
    }

    .lab-window.two {
      right: 20px;
      top: 60px;
    }

    .lab-pipe {
      position: absolute;
      right: 14px;
      top: -48px;
      width: 18px;
      height: 44px;
      border: 4px solid #050508;
      border-bottom: 0;
      background: #17100b;
      box-shadow: 0 0 10px rgba(124, 60, 255, 0.22);
    }

    .lab-pipe::before {
      content: "";
      position: absolute;
      left: -8px;
      top: -12px;
      width: 26px;
      height: 12px;
      border: 4px solid #050508;
      background: #17100b;
    }

    .hud {
      position: absolute;
      top: 14px;
      left: 14px;
      right: 14px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
    }

    .title h1 {
      margin: 0;
      color: var(--text);
      font-size: clamp(1.1rem, 5vw, 2rem);
      line-height: 1;
      text-transform: uppercase;
      text-shadow: 0 0 18px rgba(124, 60, 255, 0.7), 3px 3px 0 #000;
    }

    .title p,
    .readout {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.66rem;
      font-weight: 800;
    }

    .readout {
      position: absolute;
      left: 14px;
      bottom: 14px;
      width: 132px;
      border: 2px solid rgba(247, 244, 255, 0.58);
      border-radius: 6px;
      padding: 7px 8px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.06), transparent 40%),
        rgba(5, 5, 8, 0.78);
      box-shadow: 3px 3px 0 rgba(0, 0, 0, 0.72), 0 0 14px rgba(124, 60, 255, 0.18);
      text-align: left;
      text-transform: uppercase;
      pointer-events: auto;
    }

    .sheet-title {
      margin: 0 0 5px;
      border-bottom: 2px solid rgba(247, 244, 255, 0.48);
      padding-bottom: 4px;
      color: var(--text);
      font-size: 0.54rem;
      letter-spacing: 0;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin: 3px 0;
      color: var(--text);
      font-size: 0.56rem;
      line-height: 1.12;
    }

    .stat-row span:first-child {
      color: var(--muted);
    }

    .quick-nav {
      position: absolute;
      right: 14px;
      bottom: 14px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 69px));
      gap: 6px;
      pointer-events: auto;
    }

    .quick-nav a,
    .zoom-controls button {
      border: 2px solid rgba(247, 244, 255, 0.58);
      border-radius: 6px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.07), transparent 42%),
        rgba(5, 5, 8, 0.78);
      box-shadow: 3px 3px 0 rgba(0, 0, 0, 0.72), 0 0 12px rgba(124, 60, 255, 0.16);
      color: var(--text);
      font-weight: 900;
      text-align: center;
      text-decoration: none;
      text-transform: uppercase;
      transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease;
    }

    .quick-nav a {
      padding: 6px 7px;
      font-size: 0.54rem;
    }

    .zoom-controls {
      position: absolute;
      top: 14px;
      right: 14px;
      display: flex;
      gap: 8px;
      pointer-events: auto;
    }

    .zoom-controls button {
      width: 34px;
      height: 34px;
      padding: 0;
      cursor: pointer;
      font: inherit;
      font-size: 1rem;
      line-height: 1;
    }

    .quick-nav a:hover,
    .quick-nav a:focus-visible,
    .zoom-controls button:hover,
    .zoom-controls button:focus-visible {
      background: linear-gradient(135deg, rgba(124, 60, 255, 0.92), rgba(27, 111, 214, 0.9));
      box-shadow: 2px 2px 0 rgba(0, 0, 0, 0.72), 0 0 18px rgba(124, 60, 255, 0.32);
      transform: translate(1px, 1px);
      outline: none;
    }

    .player {
      position: absolute;
      left: 0;
      top: 0;
      width: 40px;
      height: 40px;
      filter: drop-shadow(0 0 10px rgba(248, 213, 107, 0.38)) drop-shadow(5px 5px 0 rgba(0, 0, 0, 0.72));
      transform: translate(-50%, -50%);
      transform-origin: center;
      will-change: left, top, transform;
    }

    .player.facing-left {
      transform: translate(-50%, -50%) scaleX(-1);
    }

    .pixel-bird {
      position: absolute;
      left: 4px;
      top: 4px;
      width: 4px;
      height: 4px;
      background: transparent;
      box-shadow:
        12px 0 #0b0b10, 16px 0 #0b0b10, 20px 0 #0b0b10,
        8px 4px #0b0b10, 12px 4px #ffe85c, 16px 4px #fff27a, 20px 4px #ffe85c, 24px 4px #0b0b10,
        4px 8px #0b0b10, 8px 8px #ffe85c, 12px 8px #fff27a, 16px 8px #ffe85c, 20px 8px #0b0b10, 24px 8px #f8d56b, 28px 8px #0b0b10,
        0 12px #0b0b10, 4px 12px #1b6fd6, 8px 12px #ffe85c, 12px 12px #fff27a, 16px 12px #ffe85c, 20px 12px #0b0b10, 24px 12px #050508, 28px 12px #0b0b10,
        0 16px #0b0b10, 4px 16px #1b6fd6, 8px 16px #42a5ff, 12px 16px #ffe85c, 16px 16px #fff27a, 20px 16px #ffe85c, 24px 16px #0b0b10,
        4px 20px #0b0b10, 8px 20px #1b6fd6, 12px 20px #42a5ff, 16px 20px #ffe85c, 20px 20px #0b0b10,
        8px 24px #0b0b10, 12px 24px #0b0b10, 16px 24px #0b0b10,
        12px 28px #f8d56b, 20px 28px #f8d56b,
        8px 32px #0b0b10, 12px 32px #0b0b10, 20px 32px #0b0b10, 24px 32px #0b0b10;
      image-rendering: pixelated;
    }

    .target {
      position: absolute;
      left: 0;
      top: 0;
      width: 18px;
      height: 18px;
      border: 2px solid var(--candle);
      border-radius: 50%;
      box-shadow: 0 0 18px rgba(248, 213, 107, 0.62);
      opacity: 0;
      transform: translate(-50%, -50%);
      transition: opacity 120ms ease;
      pointer-events: none;
    }

    .target.visible {
      opacity: 1;
    }

    @media (max-width: 620px) {
      .hud {
        display: grid;
      }

      .readout {
        left: 10px;
        bottom: 10px;
        width: 123px;
      }

      .quick-nav {
        right: 10px;
        bottom: 10px;
        grid-template-columns: repeat(2, minmax(0, 56px));
        gap: 5px;
      }

      .quick-nav a {
        padding: 6px 4px;
        font-size: 0.5rem;
      }

      .zoom-controls {
        top: 10px;
        right: 10px;
        gap: 6px;
      }

      .zoom-controls button {
        width: 38px;
        height: 38px;
      }

      .player {
        width: 42px;
        height: 42px;
      }
    }
  </style>
</head>
<body>
  <main id="stage" class="stage" aria-label="Black Candle Lab Zero A Budgie RPG">
    <div id="world" class="world">
      <div class="forest-floor" aria-hidden="true"></div>
      <div class="beach" aria-hidden="true"></div>
      <div class="water" aria-hidden="true"></div>
      <div class="shore-cliff" aria-hidden="true"></div>
      <div class="cliff-sand-wrap" aria-hidden="true"></div>
      <div class="tree" style="left: 120px; top: 160px;"></div>
      <div class="tree" style="left: 244px; top: 320px;"></div>
      <div class="tree" style="left: 420px; top: 210px;"></div>
      <div class="tree" style="left: 590px; top: 430px;"></div>
      <div class="tree" style="left: 780px; top: 155px;"></div>
      <div class="tree" style="left: 940px; top: 360px;"></div>
      <div class="tree" style="left: 1120px; top: 235px;"></div>
      <div class="tree" style="left: 1280px; top: 450px;"></div>
      <div class="tree" style="left: 1450px; top: 310px;"></div>
      <div class="tree" style="left: 220px; top: 590px;"></div>
      <div class="tree" style="left: 520px; top: 700px;"></div>
      <div class="tree" style="left: 860px; top: 630px;"></div>
      <div class="tree" style="left: 1180px; top: 720px;"></div>
      <div class="tree" style="left: 1380px; top: 650px;"></div>
      <div class="lab-ground" aria-hidden="true"></div>
      <div class="lab" aria-label="Lab Zero">
        <div class="lab-pipe"></div>
        <div class="lab-sign">Lab Zero</div>
        <div class="lab-window one"></div>
        <div class="lab-window two"></div>
        <div class="lab-door"></div>
      </div>
      <div id="target" class="target" aria-hidden="true"></div>
      <div id="player" class="player" aria-label="Zero"><div class="pixel-bird" aria-hidden="true"></div></div>
    </div>

    <section class="hud" aria-label="Game status">
      <div class="title">
        <h1>Black Candle Lab Zero</h1>
        <p>A Budgie RPG</p>
      </div>
    </section>

    <div id="zoom-controls" class="zoom-controls" aria-label="Zoom controls">
      <button id="zoom-out" type="button" aria-label="Zoom out">-</button>
      <button id="zoom-in" type="button" aria-label="Zoom in">+</button>
    </div>

    <div id="readout" class="readout">
      <div class="sheet-title">Subject Sheet</div>
      <div class="stat-row"><span>Subject</span><strong>Zero</strong></div>
      <div class="stat-row"><span>Status</span><strong>Compiling</strong></div>
      <div class="stat-row"><span>HP</span><strong>100</strong></div>
      <div class="stat-row"><span>Level</span><strong>1</strong></div>
      <div class="stat-row"><span>Action</span><strong>Tap to Move</strong></div>
    </div>

    <nav id="quick-nav" class="quick-nav" aria-label="Zero menu">
      <a href="characters.html">Character</a>
      <a href="inventory.html">Inventory</a>
      <a href="map.html">Map</a>
      <a href="quests.html">Quest</a>
    </nav>
  </main>

  <script>
    const WORLD_WIDTH = 1600;
    const WORLD_HEIGHT = 1200;
    const MIN_ZOOM = 0.65;
    const MAX_ZOOM = 2;
    const ZOOM_STEP = 0.25;
    const BLOCKED_TERRAIN = [
      { left: 0, top: 585, right: 210, bottom: 860 },
      { left: 0, top: 860, right: 132, bottom: 965 }
    ];

    const stage = document.getElementById("stage");
    const world = document.getElementById("world");
    const player = document.getElementById("player");
    const targetEl = document.getElementById("target");
    const readout = document.getElementById("readout");
    const quickNav = document.getElementById("quick-nav");
    const zoomControls = document.getElementById("zoom-controls");
    const zoomIn = document.getElementById("zoom-in");
    const zoomOut = document.getElementById("zoom-out");

    const state = {
      x: WORLD_WIDTH / 2,
      y: WORLD_HEIGHT / 2,
      targetX: WORLD_WIDTH / 2,
      targetY: WORLD_HEIGHT / 2,
      speed: 260,
      zoom: 1,
      cameraX: 0,
      cameraY: 0,
      lastTime: performance.now()
    };

    placePlayer();
    placeTarget();
    placeCamera();
    requestAnimationFrame(tick);

    stage.addEventListener("pointerdown", setTarget);
    stage.addEventListener("pointermove", (event) => {
      if (event.buttons === 1 && event.pointerType !== "mouse") {
        setTarget(event);
      }
    });

    [readout, quickNav, zoomControls].forEach((element) => {
      element.addEventListener("pointerdown", stopUiMovement);
    });

    zoomIn.addEventListener("click", () => changeZoom(ZOOM_STEP));
    zoomOut.addEventListener("click", () => changeZoom(-ZOOM_STEP));

    window.addEventListener("resize", () => {
      state.x = clampWorldX(state.x);
      state.y = clampWorldY(state.y);
      state.targetX = clampWorldX(state.targetX);
      state.targetY = clampWorldY(state.targetY);
      placePlayer();
      placeTarget();
      placeCamera();
    });

    function stopUiMovement(event) {
      event.stopPropagation();
    }

    function setTarget(event) {
      if (event.target.closest(".readout, .quick-nav, .zoom-controls")) {
        return;
      }

      const point = screenToWorld(event.clientX, event.clientY);
      state.targetX = clampWorldX(point.x);
      state.targetY = clampWorldY(point.y);
      targetEl.classList.add("visible");
      placeTarget();
    }

    function changeZoom(amount) {
      state.zoom = clamp(roundZoom(state.zoom + amount), MIN_ZOOM, MAX_ZOOM);
      placeCamera();
    }

    function tick(now) {
      const delta = Math.min((now - state.lastTime) / 1000, 0.05);
      state.lastTime = now;

      const dx = state.targetX - state.x;
      const dy = state.targetY - state.y;
      const distance = Math.hypot(dx, dy);
      const step = state.speed * delta;

      if (distance > 1) {
        const move = Math.min(step, distance);
        const nextX = state.x + (dx / distance) * move;
        const nextY = state.y + (dy / distance) * move;

        if (isUiBlocked(nextX, nextY) || isTerrainBlocked(nextX, nextY)) {
          state.targetX = state.x;
          state.targetY = state.y;
          targetEl.classList.remove("visible");
        } else {
          player.classList.toggle("facing-left", dx < -1);
          state.x = nextX;
          state.y = nextY;
          placePlayer();
          placeCamera();
        }
      } else {
        targetEl.classList.remove("visible");
      }

      requestAnimationFrame(tick);
    }

    function placePlayer() {
      player.style.left = `${state.x}px`;
      player.style.top = `${state.y}px`;
    }

    function placeTarget() {
      targetEl.style.left = `${state.targetX}px`;
      targetEl.style.top = `${state.targetY}px`;
    }

    function placeCamera() {
      const scaledWidth = WORLD_WIDTH * state.zoom;
      const scaledHeight = WORLD_HEIGHT * state.zoom;
      const viewWidth = window.innerWidth;
      const viewHeight = window.innerHeight;

      state.cameraX = scaledWidth <= viewWidth
        ? (viewWidth - scaledWidth) / 2
        : clamp(viewWidth / 2 - state.x * state.zoom, viewWidth - scaledWidth, 0);
      state.cameraY = scaledHeight <= viewHeight
        ? (viewHeight - scaledHeight) / 2
        : clamp(viewHeight / 2 - state.y * state.zoom, viewHeight - scaledHeight, 0);

      world.style.transform = `translate(${state.cameraX}px, ${state.cameraY}px) scale(${state.zoom})`;
    }

    function screenToWorld(screenX, screenY) {
      return {
        x: (screenX - state.cameraX) / state.zoom,
        y: (screenY - state.cameraY) / state.zoom
      };
    }

    function worldToScreen(worldX, worldY) {
      return {
        x: state.cameraX + worldX * state.zoom,
        y: state.cameraY + worldY * state.zoom
      };
    }

    function isUiBlocked(worldX, worldY) {
      const screenPoint = worldToScreen(worldX, worldY);
      return getBlockedRects().some((rect) => {
        return screenPoint.x >= rect.left && screenPoint.x <= rect.right && screenPoint.y >= rect.top && screenPoint.y <= rect.bottom;
      });
    }

    function isTerrainBlocked(worldX, worldY) {
      const radius = 18;
      return BLOCKED_TERRAIN.some((rect) => {
        return worldX >= rect.left - radius && worldX <= rect.right + radius && worldY >= rect.top - radius && worldY <= rect.bottom + radius;
      });
    }

    function getBlockedRects() {
      return [readout, quickNav, zoomControls].map((element) => {
        const rect = element.getBoundingClientRect();
        const padding = getPlayerRadius() * state.zoom + 8;
        return {
          left: rect.left - padding,
          right: rect.right + padding,
          top: rect.top - padding,
          bottom: rect.bottom + padding
        };
      });
    }

    function getPlayerRadius() {
      return player.getBoundingClientRect().width / 2;
    }

    function clampWorldX(value) {
      return clamp(value, 24, WORLD_WIDTH - 24);
    }

    function clampWorldY(value) {
      return clamp(value, 24, WORLD_HEIGHT - 24);
    }

    function roundZoom(value) {
      return Math.round(value * 100) / 100;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }
  </script>
</body>
</html>
